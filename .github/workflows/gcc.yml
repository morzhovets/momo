        - gcc_ver: '15'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
          test_libcxx20: 'Off'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++17 -Werror'
