        # ARM64
        - gcc_ver: '5'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
          test_libcxx20: 'Off'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++11 -Werror -Wno-unused-variable'
          cont_ver: '20.04'

        - gcc_ver: '5'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
