          build_type: 'Release'
          test_libcxx20: 'On'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++23'
          cont_ver: '26.04'

        - gcc_ver: '13'
          ubuntu_ver: '24.04-arm'
