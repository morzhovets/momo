name: Clang

on:
  push:
    branches:
      - '**'

jobs:
  momo-test:
    strategy:
      matrix:
        include:

        # x64
        - clang_ver: '19'
          ubuntu_ver: '24.04'
          build_type: 'Release'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++23 -Werror'

        - clang_ver: '20'
          ubuntu_ver: '24.04'
          build_type: 'Release'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++26 -Werror'

        - clang_ver: '21'
          ubuntu_ver: '24.04'
          build_type: 'Release'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++26 -Werror'

        - clang_ver: '21'
          ubuntu_ver: '24.04'
          build_type: 'Debug'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++26 -Werror -fsanitize=address,undefined'

        - clang_ver: '21'
          ubuntu_ver: '24.04'
          build_type: 'Release'
          no_exceptions_rtti: 'On'
          extra_settings: 'Off'
          flags: '-std=c++26 -Werror'

        - clang_ver: '21'
          ubuntu_ver: '24.04'
          build_type: 'Release'
          no_exceptions_rtti: 'Off'
          extra_settings: 'On'
          flags: '-std=c++26 -Werror'

        # ARM64
        - clang_ver: '19'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++23 -Werror'

        - clang_ver: '20'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++26 -Werror'

        - clang_ver: '21'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++26 -Werror'

        - clang_ver: '21'
          ubuntu_ver: '24.04-arm'
          build_type: 'Debug'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++26 -Werror -fsanitize=address,undefined'

        - clang_ver: '21'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
          no_exceptions_rtti: 'On'
          extra_settings: 'Off'
          flags: '-std=c++26 -Werror'

        - clang_ver: '21'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
          no_exceptions_rtti: 'Off'
          extra_settings: 'On'
          flags: '-std=c++26 -Werror'

    runs-on: ubuntu-${{ matrix.ubuntu_ver }}

    steps:
#    - uses: actionhippie/swap-space@v1 # 10G
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Clang
      uses: egor-tensin/setup-clang@v2
      with:
        version: ${{ matrix.clang_ver }}
#    - name: Install Clang
#      run: sudo apt install clang-${{ matrix.clang_ver }}
    - name: Build
      env:
        CXX: clang++-${{ matrix.clang_ver }}
        CXXFLAGS: ${{ matrix.flags }}
      run: |
        cd test
        mkdir build
        cd build
        cmake .. -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DMOMO_TEST_NO_EXCEPTIONS_RTTI=${{ matrix.no_exceptions_rtti }} \
          -DMOMO_TEST_EXTRA_SETTINGS=${{ matrix.extra_settings }}
        cmake --build . -v
    - name: Test
      run: test/build/momo_test
