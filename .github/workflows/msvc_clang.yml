name: MSVC Clang

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  momo-test:
    strategy:
      matrix:
        include:

        - build_type: 'Release'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std:c++latest /WX'

        - build_type: 'Debug'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std:c++latest /WX'

        - build_type: 'Release'
          no_exceptions_rtti: 'On'
          extra_settings: 'Off'
          flags: '-std:c++latest /WX'

        - build_type: 'Release'
          no_exceptions_rtti: 'Off'
          extra_settings: 'On'
          flags: '-std:c++latest /WX'

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
#    - name: Install Ninja
#      run: choco install ninja
    - name: Build
      env:
        CXX: clang-cl
        CXXFLAGS: ${{ matrix.flags }}
      run: |
        cd test
        mkdir build
        cd build
        cmake .. -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
          -DMOMO_TEST_NO_EXCEPTIONS_RTTI=${{ matrix.no_exceptions_rtti }} `
          -DMOMO_TEST_EXTRA_SETTINGS=${{ matrix.extra_settings }}
        cmake --build . -v
    - name: Test
      run: test/build/momo_test.exe
