name: Lines of code

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  calc-loc:
    strategy:
      matrix:
        include:

        - dir: '.'

        - dir: './include'

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Calculate LOC
      id: loc
      uses: PavanMudigonda/lines-of-code-reporter@v1.8
      with:
        skip_check_run: true
        directory: ${{ matrix.dir }}
