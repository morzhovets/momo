name: Perf GCC

on:
  push:
    branches:
      - '**'

jobs:
  momo-perf:
    strategy:
      matrix:
        include:

        - type: 'unordered_map'
          gcc_ver: '14'

        - type: 'unordered_map_open'
          gcc_ver: '14'

        - type: 'map'
          gcc_ver: '14'

        - type: 'data_table_static'
          gcc_ver: '14'

    # x64
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout hash-table-shootout
      uses: actions/checkout@v6
      with:
        repository: 'morzhovets/hash-table-shootout'
        ref: 'regress'
    - name: Checkout momo_v3_2
      uses: actions/checkout@v6
      with:
        repository: 'morzhovets/momo'
        ref: 'v3.2'
        path: 'momo_v3_2'
    - name: Checkout momo_v3_6
      uses: actions/checkout@v6
      with:
        repository: 'morzhovets/momo'
        ref: 'v3.6'
        path: 'momo_v3_6'
    - name: Checkout momo_v3_9
      uses: actions/checkout@v6
      with:
        repository: 'morzhovets/momo'
        ref: 'v3.9'
        path: 'momo_v3_9'
    - name: Checkout momo_v3_12
      uses: actions/checkout@v6
      with:
        repository: 'morzhovets/momo'
        ref: 'v3.12'
        path: 'momo_v3_12'
    - name: Checkout momo_cur
      uses: actions/checkout@v6
      with:
        path: 'momo_cur'
    - name: Install GCC
      run: sudo apt install g++-${{ matrix.gcc_ver }}
    - name: Build
      run: |
        mkdir build
        g++-${{ matrix.gcc_ver }} -Imomo_v3_2 -O3 -DNDEBUG -march=native -std=c++17 -o build/momo_${{ matrix.type }}_1 src/momo_${{ matrix.type }}.cc
        g++-${{ matrix.gcc_ver }} -Imomo_v3_6 -O3 -DNDEBUG -march=native -std=c++17 -o build/momo_${{ matrix.type }}_2 src/momo_${{ matrix.type }}.cc
        g++-${{ matrix.gcc_ver }} -Imomo_v3_9/include -O3 -DNDEBUG -march=native -std=c++17 -o build/momo_${{ matrix.type }}_3 src/momo_${{ matrix.type }}.cc
        g++-${{ matrix.gcc_ver }} -Imomo_v3_12/include -O3 -DNDEBUG -march=native -std=c++17 -o build/momo_${{ matrix.type }}_4 src/momo_${{ matrix.type }}.cc
        g++-${{ matrix.gcc_ver }} -Imomo_cur/include -O3 -DNDEBUG -march=native -std=c++17 -o build/momo_${{ matrix.type }}_0 src/momo_${{ matrix.type }}.cc
    - name: Test
      run: |
        sudo nice -n-20 ionice -c1 -n0 sudo -u $USER python3 momo_${{ matrix.type }}.py
