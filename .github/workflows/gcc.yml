        - gcc_ver: '15'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
          test_libcxx20: 'On'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++20 -Werror'
          cont_ver: '26.04'

        - gcc_ver: '15'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
          test_libcxx20: 'On'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++23 -Werror'
          cont_ver: '26.04'

        - gcc_ver: '15'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
          test_libcxx20: 'On'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++26 -Werror'
          cont_ver: '26.04'

        - gcc_ver: '15'
          ubuntu_ver: '24.04-arm'
          build_type: 'Debug'
          test_libcxx20: 'On'
          no_exceptions_rtti: 'Off'
          extra_settings: 'Off'
          flags: '-std=c++26 -Werror'
          cont_ver: '26.04'

        - gcc_ver: '15'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
          test_libcxx20: 'On'
          no_exceptions_rtti: 'On'
          extra_settings: 'Off'
          flags: '-std=c++26 -Werror'
          cont_ver: '26.04'

        - gcc_ver: '15'
          ubuntu_ver: '24.04-arm'
          build_type: 'Release'
          test_libcxx20: 'On'
          no_exceptions_rtti: 'Off'
          extra_settings: 'On'
          flags: '-std=c++26'
          cont_ver: '26.04'

    runs-on: ubuntu-${{ matrix.ubuntu_ver }}
    container: ubuntu:${{ matrix.cont_ver }}

    steps:
    - name: Install tools
      run: |
        apt-get update
        apt-get install -y cmake
        apt-get install -y ninja-build
    - name: Bionic in Focal (x64)
      if: matrix.cont_ver == '20.04' && matrix.ubuntu_ver == '24.04'
      run: |
        echo "deb http://archive.ubuntu.com/ubuntu/ bionic main universe" | tee -a /etc/apt/sources.list
        apt-get update
    - name: Bionic in Focal (ARM64)
      if: matrix.cont_ver == '20.04' && matrix.ubuntu_ver == '24.04-arm'
      run: |
        echo "deb http://ports.ubuntu.com/ bionic main universe" | tee -a /etc/apt/sources.list
        apt-get update
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install GCC
      run: apt-get install -y g++-${{ matrix.gcc_ver }}
    - name: Build
      env:
        CXX: g++-${{ matrix.gcc_ver }}
        CXXFLAGS: ${{ matrix.flags }}
      run: |
        cd test
        mkdir build
        cd build
        cmake .. -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DMOMO_TEST_LIBCXX20=${{ matrix.test_libcxx20 }} \
          -DMOMO_TEST_NO_EXCEPTIONS_RTTI=${{ matrix.no_exceptions_rtti }} \
          -DMOMO_TEST_EXTRA_SETTINGS=${{ matrix.extra_settings }}
        cmake --build . -v
    - name: Test
      run: test/build/momo_test
