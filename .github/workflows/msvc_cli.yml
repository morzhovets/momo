name: C++/CLI

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  momo-test:
    strategy:
      matrix:
        include:

        # Visual Studio 2026
        - win_ver: '2025-vs2026'
          build_type: 'Release'
          flags: '/std:c++20 /WX'

    runs-on: windows-${{ matrix.win_ver }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Build
      env:
        CXXFLAGS: ${{ matrix.flags }}
      run: |
        cd test
        mkdir build
        cd build
        cmake .. -DMOMO_TEST_MSVC_CLI=On -DCMAKE_VERBOSE_MAKEFILE=On
        cmake --build . --config ${{ matrix.build_type }}
#    - name: Test
#      run: test/build/${{ matrix.build_type }}/momo_test.exe
